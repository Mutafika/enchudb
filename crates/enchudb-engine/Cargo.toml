[package]
name = "enchudb-engine"
version = "0.1.0"
edition = "2024"
description = "EnchuDB engine — 紐ベース円柱エンジン本体。WAL / BlobStore / HLC primitive / keys / ACL まで含む、単独 DB として動く層。"
license = "MIT OR Apache-2.0"
authors = ["mutafika"]
repository = "https://github.com/mutafika/enchudb"

[features]
v26 = []
v27 = ["dep:crossbeam-queue"]
v32 = ["v27", "dep:ed25519-dalek", "dep:rand_core"]
v33 = ["v32"]

[dependencies]
crossbeam-queue = { version = "0.3", optional = true }
ed25519-dalek = { version = "2", optional = true, features = ["rand_core"] }
rand_core = { version = "0.6", optional = true, features = ["getrandom"] }
sha2 = "0.10"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
memmap2 = "0.9"
libc = "0.2"
