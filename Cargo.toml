[package]
name = "enchudb"
version = "0.1.0"
edition = "2024"
description = "EnchuDB — 紐ベース円柱エンジン。prefix sum O(1)。全mmap。"

[features]
v26 = []
v27 = ["dep:crossbeam-queue"]
v32 = ["v27", "dep:ed25519-dalek", "dep:rand_core"]
ws = ["v32", "dep:tungstenite"]
crdt = ["v32"]
chaos = ["v32", "crdt"]

[dependencies]
crossbeam-queue = { version = "0.3", optional = true }
ed25519-dalek = { version = "2", optional = true, features = ["rand_core"] }
rand_core = { version = "0.6", optional = true, features = ["getrandom"] }
tungstenite = { version = "0.24", optional = true, default-features = false, features = ["handshake"] }
sha2 = "0.10"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
memmap2 = "0.9"

[dev-dependencies]
proptest = "1"
rusqlite = { version = "0.36", features = ["bundled"] }
sabitori = { path = "../sabitori/crates/sabitori" }
sabitori-style = { path = "../sabitori/crates/sabitori-style" }
sabitori-core = { path = "../sabitori/crates/sabitori-core" }

[[example]]
name = "dist_dashboard"
path = "examples/dist_dashboard.rs"
required-features = ["v32"]

[[bin]]
name = "enchu_demo"
path = "src/bin/enchu_demo.rs"
required-features = ["v32"]

[[bin]]
name = "bench_distributed"
path = "src/bin/bench_distributed.rs"
required-features = ["v32"]
