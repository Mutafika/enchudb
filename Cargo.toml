[package]
name = "enchudb"
version = "0.1.0"
edition = "2024"
description = "EnchuDB — 紐ベース円柱エンジン。prefix sum O(1)。全mmap。"

[features]
v26 = []
v27 = ["dep:crossbeam-queue"]

[dependencies]
crossbeam-queue = { version = "0.3", optional = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
memmap2 = "0.9"

[dev-dependencies]
proptest = "1"
rusqlite = { version = "0.36", features = ["bundled"] }
